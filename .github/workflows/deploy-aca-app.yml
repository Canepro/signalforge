name: Deploy ACA App

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR tag to deploy. Prefer the immutable full commit SHA tag.
        required: true
      secret_source:
        description: Where deploy secrets come from.
        required: true
        type: choice
        default: infisical
        options:
          - infisical
          - github-environment
      github_environment:
        description: GitHub environment that holds ACA deploy vars and optional fallback secrets.
        required: false
        default: aca-app
      container_app_name:
        description: ACA app name to deploy. Default is the durable app target.
        required: false
        default: ca-signalforge
      revision_suffix:
        description: Optional ACA revision suffix. Leave blank to auto-derive sha<12> from a SHA tag.
        required: false
        default: ""
      what_if:
        description: Run Azure what-if instead of creating or updating the app.
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy ACA app
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    env:
      IMAGE_REPOSITORY: ghcr.io/canepro/signalforge
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Infisical workflow config
        if: ${{ inputs.secret_source == 'infisical' }}
        env:
          INFISICAL_IDENTITY_ID: ${{ vars.INFISICAL_IDENTITY_ID }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
          INFISICAL_ENV_SLUG: ${{ vars.INFISICAL_ENV_SLUG }}
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for key in INFISICAL_IDENTITY_ID INFISICAL_PROJECT_SLUG INFISICAL_ENV_SLUG; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Missing required GitHub environment vars for Infisical: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Fetch deploy secrets from Infisical
        if: ${{ inputs.secret_source == 'infisical' }}
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG }}
          domain: ${{ vars.INFISICAL_DOMAIN || 'https://app.infisical.com' }}
          secret-path: ${{ vars.INFISICAL_SECRET_PATH || '/' }}

      - name: Resolve deploy secrets
        env:
          SECRET_SOURCE: ${{ inputs.secret_source }}
          GH_DATABASE_URL: ${{ secrets.ACA_APP_DATABASE_URL }}
          GH_ADMIN_TOKEN: ${{ secrets.ACA_APP_ADMIN_TOKEN }}
          GH_RUNS_API_TOKEN: ${{ secrets.ACA_APP_RUNS_API_TOKEN }}
          GH_OPENAI_API_KEY: ${{ secrets.ACA_APP_OPENAI_API_KEY }}
          GH_AZURE_OPENAI_API_KEY: ${{ secrets.ACA_APP_AZURE_OPENAI_API_KEY }}
          GH_CODEX_APP_SERVER_WS_BEARER_TOKEN: ${{ secrets.ACA_APP_CODEX_APP_SERVER_WS_BEARER_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          database_url="${DATABASE_URL:-${GH_DATABASE_URL:-}}"
          admin_token="${SIGNALFORGE_ADMIN_TOKEN:-${GH_ADMIN_TOKEN:-}}"
          runs_api_token="${SIGNALFORGE_RUNS_API_TOKEN:-${GH_RUNS_API_TOKEN:-}}"
          runs_require_auth="${SIGNALFORGE_RUNS_REQUIRE_AUTH:-${ACA_RUNS_REQUIRE_AUTH:-true}}"
          public_landing_only="${SIGNALFORGE_PUBLIC_LANDING_ONLY:-${ACA_PUBLIC_LANDING_ONLY:-true}}"
          openai_api_key="${OPENAI_API_KEY:-${GH_OPENAI_API_KEY:-}}"
          azure_openai_api_key="${AZURE_OPENAI_API_KEY:-${GH_AZURE_OPENAI_API_KEY:-}}"
          codex_app_server_ws_bearer_token="${CODEX_APP_SERVER_WS_BEARER_TOKEN:-${GH_CODEX_APP_SERVER_WS_BEARER_TOKEN:-}}"

          if [[ -z "$database_url" ]]; then
            echo "Missing required deploy secret: DATABASE_URL or ACA_APP_DATABASE_URL" >&2
            exit 1
          fi

          if [[ -z "$admin_token" ]]; then
            echo "Missing required deploy secret: SIGNALFORGE_ADMIN_TOKEN or ACA_APP_ADMIN_TOKEN" >&2
            exit 1
          fi

          {
            printf 'ACA_DATABASE_URL=%s\n' "$database_url"
            printf 'ACA_ADMIN_TOKEN=%s\n' "$admin_token"
            printf 'ACA_RUNS_REQUIRE_AUTH=%s\n' "$runs_require_auth"
            printf 'ACA_PUBLIC_LANDING_ONLY=%s\n' "$public_landing_only"
          } >> "$GITHUB_ENV"

          if [[ -n "$runs_api_token" ]]; then
            printf 'ACA_RUNS_API_TOKEN=%s\n' "$runs_api_token" >> "$GITHUB_ENV"
          fi

          if [[ -n "$openai_api_key" ]]; then
            printf 'ACA_OPENAI_API_KEY=%s\n' "$openai_api_key" >> "$GITHUB_ENV"
          fi

          if [[ -n "$azure_openai_api_key" ]]; then
            printf 'ACA_AZURE_OPENAI_API_KEY=%s\n' "$azure_openai_api_key" >> "$GITHUB_ENV"
          fi

          if [[ -n "$codex_app_server_ws_bearer_token" ]]; then
            printf 'ACA_CODEX_APP_SERVER_WS_BEARER_TOKEN=%s\n' "$codex_app_server_ws_bearer_token" >> "$GITHUB_ENV"
          fi

          echo "ACA_SECRET_SOURCE=$SECRET_SOURCE" >> "$GITHUB_ENV"

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy with checked-in ACA template
        env:
          ACA_RESOURCE_GROUP: ${{ vars.ACA_APP_RESOURCE_GROUP }}
          ACA_ENVIRONMENT_ID: ${{ vars.ACA_APP_ENVIRONMENT_ID }}
          ACA_CPU: ${{ vars.ACA_APP_CPU }}
          ACA_MEMORY: ${{ vars.ACA_APP_MEMORY }}
          ACA_MIN_REPLICAS: ${{ vars.ACA_APP_MIN_REPLICAS }}
          ACA_MAX_REPLICAS: ${{ vars.ACA_APP_MAX_REPLICAS }}
          ACA_TARGET_PORT: ${{ vars.ACA_APP_TARGET_PORT }}
          ACA_CUSTOM_DOMAINS_JSON: ${{ vars.ACA_APP_CUSTOM_DOMAINS_JSON }}
          ACA_LLM_PROVIDER: ${{ vars.ACA_APP_LLM_PROVIDER }}
          ACA_OPENAI_MODEL: ${{ vars.ACA_APP_OPENAI_MODEL }}
          ACA_AZURE_OPENAI_ENDPOINT: ${{ vars.ACA_APP_AZURE_OPENAI_ENDPOINT }}
          ACA_AZURE_OPENAI_DEPLOYMENT: ${{ vars.ACA_APP_AZURE_OPENAI_DEPLOYMENT }}
          ACA_AZURE_OPENAI_API_VERSION: ${{ vars.ACA_APP_AZURE_OPENAI_API_VERSION }}
          ACA_CODEX_APP_SERVER_TRANSPORT: ${{ vars.ACA_APP_CODEX_APP_SERVER_TRANSPORT }}
          ACA_CODEX_APP_SERVER_MODEL: ${{ vars.ACA_APP_CODEX_APP_SERVER_MODEL }}
          ACA_CODEX_APP_SERVER_TURN_TIMEOUT_MS: ${{ vars.ACA_APP_CODEX_APP_SERVER_TURN_TIMEOUT_MS }}
          ACA_CODEX_APP_SERVER_WS_URL: ${{ vars.ACA_APP_CODEX_APP_SERVER_WS_URL }}
          ACA_CODEX_APP_SERVER_WS_ALLOW_REMOTE: ${{ vars.ACA_APP_CODEX_APP_SERVER_WS_ALLOW_REMOTE }}
        shell: bash
        run: |
          set -euo pipefail

          image_ref="${IMAGE_REPOSITORY}:${{ inputs.image_tag }}"
          ACA_LLM_PROVIDER="${LLM_PROVIDER:-${ACA_LLM_PROVIDER:-}}"
          ACA_OPENAI_MODEL="${OPENAI_MODEL:-${ACA_OPENAI_MODEL:-}}"
          ACA_AZURE_OPENAI_ENDPOINT="${AZURE_OPENAI_ENDPOINT:-${ACA_AZURE_OPENAI_ENDPOINT:-}}"
          ACA_AZURE_OPENAI_DEPLOYMENT="${AZURE_OPENAI_DEPLOYMENT:-${ACA_AZURE_OPENAI_DEPLOYMENT:-}}"
          ACA_AZURE_OPENAI_API_VERSION="${AZURE_OPENAI_API_VERSION:-${ACA_AZURE_OPENAI_API_VERSION:-}}"
          ACA_CODEX_APP_SERVER_TRANSPORT="${CODEX_APP_SERVER_TRANSPORT:-${ACA_CODEX_APP_SERVER_TRANSPORT:-}}"
          ACA_CODEX_APP_SERVER_MODEL="${CODEX_APP_SERVER_MODEL:-${ACA_CODEX_APP_SERVER_MODEL:-}}"
          ACA_CODEX_APP_SERVER_TURN_TIMEOUT_MS="${CODEX_APP_SERVER_TURN_TIMEOUT_MS:-${ACA_CODEX_APP_SERVER_TURN_TIMEOUT_MS:-}}"
          ACA_CODEX_APP_SERVER_WS_URL="${CODEX_APP_SERVER_WS_URL:-${ACA_CODEX_APP_SERVER_WS_URL:-}}"
          ACA_CODEX_APP_SERVER_WS_ALLOW_REMOTE="${CODEX_APP_SERVER_WS_ALLOW_REMOTE:-${ACA_CODEX_APP_SERVER_WS_ALLOW_REMOTE:-}}"

          args=(
            --resource-group "${ACA_RESOURCE_GROUP}"
            --environment-id "${ACA_ENVIRONMENT_ID}"
            --app-name "${{ inputs.container_app_name }}"
            --image "$image_ref"
          )

          if [[ -n "${ACA_CPU}" ]]; then
            args+=(--cpu "${ACA_CPU}")
          fi
          if [[ -n "${ACA_MEMORY}" ]]; then
            args+=(--memory "${ACA_MEMORY}")
          fi
          if [[ -n "${ACA_MIN_REPLICAS}" ]]; then
            args+=(--min-replicas "${ACA_MIN_REPLICAS}")
          fi
          if [[ -n "${ACA_MAX_REPLICAS}" ]]; then
            args+=(--max-replicas "${ACA_MAX_REPLICAS}")
          fi
          if [[ -n "${ACA_TARGET_PORT}" ]]; then
            args+=(--target-port "${ACA_TARGET_PORT}")
          fi
          if [[ -n "${ACA_CUSTOM_DOMAINS_JSON}" ]]; then
            args+=(--custom-domains-json "${ACA_CUSTOM_DOMAINS_JSON}")
          fi
          if [[ -n "${ACA_LLM_PROVIDER}" ]]; then
            args+=(--llm-provider "${ACA_LLM_PROVIDER}")
          fi
          if [[ -n "${ACA_OPENAI_MODEL}" ]]; then
            args+=(--openai-model "${ACA_OPENAI_MODEL}")
          fi
          if [[ -n "${ACA_AZURE_OPENAI_ENDPOINT}" ]]; then
            args+=(--azure-openai-endpoint "${ACA_AZURE_OPENAI_ENDPOINT}")
          fi
          if [[ -n "${ACA_AZURE_OPENAI_DEPLOYMENT}" ]]; then
            args+=(--azure-openai-deployment "${ACA_AZURE_OPENAI_DEPLOYMENT}")
          fi
          if [[ -n "${ACA_AZURE_OPENAI_API_VERSION}" ]]; then
            args+=(--azure-openai-api-version "${ACA_AZURE_OPENAI_API_VERSION}")
          fi
          if [[ -n "${ACA_CODEX_APP_SERVER_TRANSPORT}" ]]; then
            args+=(--codex-app-server-transport "${ACA_CODEX_APP_SERVER_TRANSPORT}")
          fi
          if [[ -n "${ACA_CODEX_APP_SERVER_MODEL}" ]]; then
            args+=(--codex-app-server-model "${ACA_CODEX_APP_SERVER_MODEL}")
          fi
          if [[ -n "${ACA_CODEX_APP_SERVER_TURN_TIMEOUT_MS}" ]]; then
            args+=(--codex-app-server-turn-timeout-ms "${ACA_CODEX_APP_SERVER_TURN_TIMEOUT_MS}")
          fi
          if [[ -n "${ACA_CODEX_APP_SERVER_WS_URL}" ]]; then
            args+=(--codex-app-server-ws-url "${ACA_CODEX_APP_SERVER_WS_URL}")
          fi
          if [[ -n "${ACA_CODEX_APP_SERVER_WS_ALLOW_REMOTE}" ]]; then
            args+=(--codex-app-server-ws-allow-remote "${ACA_CODEX_APP_SERVER_WS_ALLOW_REMOTE}")
          fi
          if [[ -n "${{ inputs.revision_suffix }}" ]]; then
            args+=(--revision-suffix "${{ inputs.revision_suffix }}")
          fi
          if [[ "${{ inputs.what_if }}" == "true" ]]; then
            args+=(--what-if)
          fi

          bash scripts/deploy-aca-app.sh "${args[@]}"

      - name: Resolve ACA hostname
        id: app
        if: ${{ !inputs.what_if }}
        env:
          ACA_RESOURCE_GROUP: ${{ vars.ACA_APP_RESOURCE_GROUP }}
        shell: bash
        run: |
          set -euo pipefail

          fqdn="$(az containerapp show \
            --name "${{ inputs.container_app_name }}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"

          echo "fqdn=$fqdn" >> "$GITHUB_OUTPUT"

      - name: Run API smoke checks
        if: ${{ !inputs.what_if }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/check-aca-app.sh "https://${{ steps.app.outputs.fqdn }}"

      - name: Write summary
        shell: bash
        run: |
          {
            echo "## ACA deploy request"
            echo
            echo "- secret source: \`${{ inputs.secret_source }}\`"
            echo "- GitHub environment: \`${{ inputs.github_environment }}\`"
            echo "- app: \`${{ inputs.container_app_name }}\`"
            echo "- image: \`${IMAGE_REPOSITORY}:${{ inputs.image_tag }}\`"
            echo "- what-if: \`${{ inputs.what_if }}\`"
            if [[ -n "${{ inputs.revision_suffix }}" ]]; then
              echo "- revision suffix: \`${{ inputs.revision_suffix }}\`"
            fi
            if [[ "${{ inputs.what_if }}" != "true" && -n "${{ steps.app.outputs.fqdn }}" ]]; then
              echo "- hostname: \`https://${{ steps.app.outputs.fqdn }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
